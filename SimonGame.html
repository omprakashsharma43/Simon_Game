<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Simon Game</title>
	<link rel="stylesheet" type="text/css" href="SimonGame.css">
</head>
<body>
	<h1><b><u>Simon Game</u></b></h1>
	<h2>Press any key to Start</h2>
	<div class="btn-container">
		<div class="line1">
			<div class="btn one" type="button" id="one"></div>
			<div class="btn two" type="button" id="two"></div>
		</div>
		<div class="line2">
			<div class="btn three" type="button" id="three"></div>
			<div class="btn four" type="button" id="four"></div>
		</div>
	</div>
<script type="text/javascript" src="SimonGame.js"></script>
</body>
</html>
